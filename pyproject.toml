[project]
name = "aerocapture"
version = "0.1.0"
description = "Trajectory simulation tool for aerocapture maneuvers"
requires-python = ">=3.11"
dependencies = [
    "numpy>=1.26",
    "pandas>=2.1",
    "matplotlib>=3.8",
]

[project.optional-dependencies]
training = [
    "deap>=1.4",
    "scipy>=1.12",
]
dev = [
    "pytest>=8.0",
    "ruff>=0.4",
    "mypy>=1.9",
    "pandas-stubs>=2.1",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/python/aerocapture"]

[tool.pytest.ini_options]
testpaths = ["tests"]
pythonpath = ["src/python"]

[tool.ruff]
line-length = 160
target-version = "py311"

[tool.ruff.lint]
select = ["E", "F", "I", "W", "UP", "B", "SIM"]

[tool.mypy]
python_version = "3.11"
warn_return_any = true
warn_unused_configs = true
disallow_untyped_defs = true
mypy_path = "src/python"
