# Shared RL training defaults. Fragment — leaf configs should list common.toml
# and a mission TOML in their `base` alongside this file (which is no-base so
# that the config_loading.rs::all_configs_are_consolidated test skips it).

[rl]
algorithm                   = "ppo"
total_env_steps             = 5_000_000
n_envs                      = 64
seed_base                   = 3_000_000
validation_n_sims           = 1000
validation_interval_updates = 20
checkpoint_interval_updates = 50

[rl.reward]
shaping_enabled = true
shaping_alpha   = 1.0
energy_scale    = 1.0e6
pdyn_scale      = 1.0e3

[rl.ppo]
learning_rate     = 3.0e-4
rollout_steps     = 2048
update_epochs     = 10
minibatches       = 32
gamma             = 0.99
gae_lambda        = 0.95
clip_range        = 0.2
entropy_coef      = 0.0
value_coef        = 0.5
max_grad_norm     = 0.5
initial_log_std   = -0.5

[rl.sac]
learning_rate    = 3.0e-4
buffer_size      = 1_000_000
batch_size       = 256
gamma            = 0.99
tau              = 0.005
train_every      = 1
gradient_steps   = 1
target_entropy   = "auto"
initial_alpha    = 0.2
