# Study A (big net) -- supervised warm-start then islands on dense_p3998.
base = ["../sweep/dense_p3998.toml"]

[data]
neural_network = "training_output/paper_optbig_warmstart/best_model.json"
results_suffix = ".paper_optbig_warmstart"

[optimizer]
algorithm = "islands"

[warm_start]
supervisor_schemes = ["ftc", "equilibrium_glide", "energy_controller", "pred_guid", "fnpag"]
n_warm_seeds = 200
n_epochs = 10
bptt_length = 32
