# Cell: dense_p3998 (17->72->36->2, atan2) cell -- cmaes. Study wiring lives in experiments/paper/.
# 3998 < _CMAES_MAX_PARAMS (20000) so it runs natively, but the O(n^2) covariance
# (~4000x4000) makes it slow/heavy -- its struggle at scale is part of the finding.
base = ["../sweep/dense_p3998.toml"]

[data]
neural_network = "training_output/paper/cells/dense_p3998_cmaes/best_model.json"
results_suffix = ".dense_p3998_cmaes"

[optimizer]
algorithm = "cma_es"
