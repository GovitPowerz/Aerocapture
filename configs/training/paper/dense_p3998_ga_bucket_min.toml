# Cell: dense_p3998 (17->72->36->2, atan2) cell -- ga_bucket_min. Study wiring lives in experiments/paper/.
# Pick the EASIEST (min-cost) seed of each CDF bin as its representative.
base = ["../sweep/dense_p3998.toml"]

[data]
neural_network = "training_output/paper/cells/dense_p3998_ga_bucket_min/best_model.json"
results_suffix = ".dense_p3998_ga_bucket_min"

[optimizer]
algorithm = "ga"
curation_bucket_selection = "min"
