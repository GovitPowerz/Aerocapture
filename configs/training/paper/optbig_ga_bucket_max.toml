# Bucket-representative sub-study -- GA on dense_p3998, adaptive seeds.
# Pick the HARDEST (max-cost) seed of each CDF bin as its representative
# -- the "does the worst case per quantile help convergence" test.
base = ["../sweep/dense_p3998.toml"]

[data]
neural_network = "training_output/paper_optbig_ga_bucket_max/best_model.json"
results_suffix = ".paper_optbig_ga_bucket_max"

[optimizer]
algorithm = "ga"
curation_bucket_selection = "max"
