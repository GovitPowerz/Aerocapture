# Window-matched dense control (reviewer R1 major 5: state-ablation controls).
# Explicit 5-tick observation history through a zero-parameter FIFO window, NO
# learned state -- the "matched observation-history" alternative to the deployed
# Mamba_962. Budget-matched: 970 trainable weights vs the Mamba's 962.
# Base-inherits the tuned atan2 pipeline (17-input mask, calibrated
# normalization, full_neural / atan2_signed, scaffolding = live, command
# shaping + navigation) exactly like sweep/mamba_p962.toml; overrides only the
# architecture and deploy path. Trained by experiments/paper/15_state_controls.sh
# (n_sims=2, n_pop=512, 20000 gens, up to 3 seeds -- sequential-seed protocol
# in the runner header).
base = ["../msr_aller_nn_atan2_train.toml"]

[data]
neural_network = "training_output/paper_window_ctrl_p970/best_model.json"
results_suffix = ".window_ctrl_p970"

# Window(17 x 5) -> 85 -> Dense(85 -> 11, swish) = 946 params
#                      -> Dense(11 -> 2, asinh)  =  24 params -> 970 total
[[network.architecture]]
type = "window"
input_size = 17
n_steps = 5

[[network.architecture]]
type = "dense"
input_size = 85
output_size = 11
activation = "swish"

[[network.architecture]]
type = "dense"
input_size = 11
output_size = 2
activation = "asinh"
