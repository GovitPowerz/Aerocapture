# cost_transform sweep -- GA on dense_p3998, sqrt cost (softened, ~mean).
base = ["../sweep/dense_p3998.toml"]

[data]
neural_network = "training_output/paper_optbig_ga_sqrt/best_model.json"
results_suffix = ".paper_optbig_ga_sqrt"

[optimizer]
algorithm = "ga"

[cost_function]
cost_transform = "sqrt"
