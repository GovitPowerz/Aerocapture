# Study A (big net) -- CMA-ES on dense_p3998 (~4000 params, compute-matched n_pop=300).
# 3998 < _CMAES_MAX_PARAMS (20000) so it runs natively, but the O(n^2) covariance
# (~4000x4000) makes it slow/heavy -- its struggle at scale is part of the finding.
base = ["../sweep/dense_p3998.toml"]

[data]
neural_network = "training_output/paper_optbig_cmaes/best_model.json"
results_suffix = ".paper_optbig_cmaes"

[optimizer]
algorithm = "cma_es"
