# Study A -- GA on the dense_p515 control architecture (compute-matched n_pop=300).
base = ["../sweep/dense_p515.toml"]

[data]
neural_network = "training_output/paper_opt_ga_nsim/best_model.json"
results_suffix = ".paper_opt_ga_nsim"

[optimizer]
algorithm = "ga"
seed_strategy = "adaptive"    # fixed | rotating | adaptive
seed_pool_interval = 2       # curation periodic-fallback interval (gens) -- also fires on validated best
training_n_sims = 10          # fresh random seeds per individual per generation (epoch rotation)
validation_n_sims = 1000      # sims for validation gate (fixed seeds, honest generalization metric)
curation_top_k = 1            # top-K individuals whose cost CDF is averaged at each curation
curation_sample_size = 1000   # seeds drawn per curation to sample the cost distribution
curation_bucket_selection = "max"
