# Bucket-representative sub-study -- GA on dense_p3998, adaptive seeds.
# Pick the EASIEST (min-cost) seed of each CDF bin as its representative.
base = ["../sweep/dense_p3998.toml"]

[data]
neural_network = "training_output/paper_optbig_ga_bucket_min/best_model.json"
results_suffix = ".paper_optbig_ga_bucket_min"

[optimizer]
algorithm = "ga"
curation_bucket_selection = "min"
