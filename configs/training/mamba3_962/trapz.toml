# Mamba-3 962-cell ablation -- TRAPZ arm (trapezoidal + real).
# Exponential-trapezoidal discretization: adds lambda_logit (16 params, inits +4
# = near-euler). 962 + 16 = 978 trainable NN params (+3 scaffolding).
# Same cell + pipeline as baseline.toml; differs ONLY in the mamba3 flags.
base = ["../msr_aller_nn_atan2_train.toml"]

[data]
neural_network = "training_output/mamba3_962/trapz/best_model.json"
results_suffix = ".mamba3_962_trapz"

[[network.architecture]]
type = "dense"
input_size = 17
output_size = 16
activation = "swish"

[[network.architecture]]
type = "mamba3"
input_size = 16
d_state = 12
discretization = "trapezoidal"
state_mode = "real"

[[network.architecture]]
type = "dense"
input_size = 16
output_size = 2
activation = "asinh"

[optimizer]
algorithm = "ga"
n_pop = 512
n_gen = 10000
training_n_sims = 2
seed_strategy = "adaptive"
curation_bucket_selection = "max"
