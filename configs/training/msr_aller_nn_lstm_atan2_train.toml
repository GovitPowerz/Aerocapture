# LSTM decoder on the atan2 input pipeline. Inherits the 17-input mask, the
# calibrated [network.normalization] (35 entries), full_neural / atan2_signed,
# scaffolding = "live", command shaping and navigation from the atan2 config;
# overrides only the architecture (Dense -> LSTM -> Dense) and the deploy path.
base = ["msr_aller_nn_atan2_train.toml"]

[data]
neural_network = "training_output/neural_network_lstm_atan2/best_model.json"
results_suffix = ".train_nn_lstm_atan2"

# Architecture arrays REPLACE (not merge) under deep-merge, so this fully
# supersedes atan2's 3-dense stack. Sized under the 758-param plain-atan2 budget
# (<1000 weights): frontend Dense(17->12) compresses the 17 masked inputs, LSTM
# hidden=8 carries the (h,c) temporal memory, final Dense(8->2) feeds atan2_signed.
# LSTM's 4-gate cost (4HI+4HH+8H) is pricier than GRU, so hidden=8 here vs 10.
# Params: 216 + lstm(12,8)=704 + 18 = 938.
[[network.architecture]]
type = "dense"
input_size = 17
output_size = 12
activation = "swish"

[[network.architecture]]
type = "lstm"
input_size = 12
hidden_size = 8

[[network.architecture]]
type = "dense"
input_size = 8
output_size = 2
activation = "asinh"
