# Shared training config — inherited by all 6 training TOMLs
# Contains simulation seed, MC dispersion levels, and cost function thresholds

[simulation]
random_seed = 0.6866
n_sims = 1000
max_time = 2000.0

[integration]
mode = "fixed"

# ── Domain-based Monte Carlo dispersions ──
[monte_carlo]
seed = 42
sampling = "lhs"

[monte_carlo.initial_state]
level = "medium"

[monte_carlo.atmosphere]
level = "medium"

[monte_carlo.aerodynamics]
level = "medium"

[monte_carlo.navigation]
level = "medium"

[monte_carlo.mass]
level = "medium"

[monte_carlo.vehicle]
level = "medium"

[monte_carlo.pilot]
level = "medium"

[monte_carlo.density_perturbation]
level = "low"

[monte_carlo.wind]
level = "low"

[monte_carlo.nav_filter]
level = "medium"

[checkpoints]
keep_last = 10   # null (default) keeps every checkpoint

[cost_function]
dv_threshold = 500.0
# Constraint limits come from [flight.constraints] in the mission TOML
g_load_weight = 10.0
heat_flux_weight = 10.0
heat_load_weight = 10.0
cost_transform = "sqrt"

[optimizer]
algorithm = "ga"
seed_strategy = "rotating"    # fixed | rotating | adaptive
n_pop = 60
n_gen = 2500
seed_pool_interval = 50       # curation periodic-fallback interval (gens) -- also fires on validated best
training_n_sims = 20          # fresh random seeds per individual per generation (epoch rotation)
validation_n_sims = 1000      # sims for validation gate (fixed seeds, honest generalization metric)
curation_top_k = 5            # top-K individuals whose cost CDF is averaged at each curation
curation_sample_size = 1000   # seeds drawn per curation to sample the cost distribution

# ── GA: SBX crossover + polynomial mutation ──
# Lower eta = more exploratory (uniform-crossover-like). Higher eta = offspring closer to parents.
# Old binary GA was maximally exploratory; eta=2-5 is the closest real-valued equivalent.
# mutation_prob = null means 1/n_params (pymoo default). Set higher for more exploration.
[optimizer.ga]
crossover_eta = 3
mutation_eta = 5
mutation_prob = 0.15

# ── CMA-ES: covariance matrix adaptation (best for 10-50 params) ──
# sigma0 = initial step size in normalized [0,1] space. 0.3 is a good starting point.
# Falls back to GA automatically when n_params > 200 (NN).
# To use: set algorithm = "cma_es" in scheme-specific TOML or --algorithm cma_es
[optimizer.cma_es]
sigma0 = 0.3
restart_strategy = "ipop"

# ── DE: differential evolution (robust, good for noisy fitness) ──
# variant: DE/rand/1/bin is the classic. DE/best/1/bin converges faster but less diverse.
# CR (crossover prob) 0.7-0.9, F (scaling factor) 0.5-0.8 are typical.
# To use: set algorithm = "de" or --algorithm de
[optimizer.de]
variant = "DE/best/1/bin"
crossover_prob = 0.8
scaling_factor = 0.6

# ── PSO: particle swarm (fast convergence, can stagnate) ──
# w = inertia (0.4-0.9, lower = more local search), c1 = cognitive, c2 = social.
# To use: set algorithm = "pso" or --algorithm pso
[optimizer.pso]
w = 0.7
c1 = 1.5
c2 = 1.5

# ── Command shaping (acceleration-limited rate shaping) ──
[guidance.command_shaping]
enabled = true
max_bank_acceleration = 5.0  # deg/s^2 (GA range: 2-15)
