# MSR outbound — NN training, 50 MC sims per evaluation, domain-based dispersions
base = ["../missions/mars.toml", "common.toml"]

[guidance]
type = "neural_network"

[navigation]
density_filter_gain = 0.6
density_gain_max_delta = 0.3

[network]
layer_sizes = [16, 8, 2]
activations = ["tanh", "asinh"]

[data]
neural_network = "data/neural_network/nn_model.json"
results_suffix = ".train_nn"
