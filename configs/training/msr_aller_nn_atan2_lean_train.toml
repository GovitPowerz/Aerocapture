base = ["msr_aller_nn_train_consolidated.toml"]

[data]
neural_network = "training_output/neural_network_atan2_lean/best_model.json"
results_suffix = ".train_atan2_lean"

[network]
# Lean atan2-only experiment: the 5 inputs that ablated > 0.9 for the 17-input
# atan2 model (accel_magnitude=5, drag_accel=11, hdot_nominal=18, predicted_dv2=33,
# predicted_dv3=34). Tests how lean atan2's highly-redundant representation can go
# (every other input ablated < 0.5 for atan2). NOTE: this drops ALL bank-history
# inputs (27-30) and pdyn_error/orbital_energy, so watch bank smoothness
# (n_roll_reversals, cumulative_bank_change_deg) not just DV -- a memoryless signed
# decoder with no sign-continuity input may chatter even if DV stays good.
input_mask = [5, 11, 18, 33, 34]

[[network.architecture]]
type = "dense"
input_size = 5
output_size = 32
activation = "swish"

[[network.architecture]]
type = "dense"
input_size = 32
output_size = 16
activation = "swish"

[[network.architecture]]
type = "dense"
input_size = 16
output_size = 2
activation = "asinh"
