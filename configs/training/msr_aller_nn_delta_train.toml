base = ["../missions/mars.toml", "common.toml", "nn_common.toml"]

[guidance.neural_network]
mode = "full_neural"
scaffolding = "live"
output_parameterization = "delta"
delta_max = 0.35

[data]
neural_network = "training_output/neural_network_delta_pso_pruned/best_model.json"
results_suffix = ".train_delta_pso"

[network]
# 17 inputs: 13-mask + pdyn_error(19) + live correction-DV predicted_dv1/2/3 (32,33,34).
# All inputs renormalized data-driven (calibrate_inputs.py): asinh on accelerations /
# pdyn_error / DV, calibrated affine on bounded inputs, per-component sentinel-excluded DV
# scales. predicted_dv* = per-tick compute_deltav on the current osculating orbit (asinh,
# +1.5 sentinel pre-capture).
input_mask = [0, 2, 3, 5, 6, 7, 11, 12, 18, 19, 27, 28, 29, 30, 32, 33, 34]

[[network.architecture]]
type = "dense"
input_size = 17
output_size = 32
activation = "swish"

[[network.architecture]]
type = "dense"
input_size = 32
output_size = 16
activation = "swish"

[[network.architecture]]
type = "dense"
input_size = 16
output_size = 1
activation = "tanh"

