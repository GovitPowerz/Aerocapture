base = ["../missions/mars.toml", "common.toml", "nn_common.toml"]

[guidance.neural_network]
mode = "full_neural"
scaffolding = "live"
output_parameterization = "delta"
delta_max = 0.35

[data]
neural_network = "training_output/neural_network_delta_pso_pruned/best_model.json"
results_suffix = ".train_delta_pso"

[network]
# 13 inputs: 11-mask + accel_magnitude(5) + heat_load_fraction(7) restored --
# the two high-importance removals that degraded atan2/delta in the 11-input run
# (accel_magnitude=atan2 3.32, heat_load_fraction=delta 3.22). pdyn_nominal(17)
# stays dropped (delta ablated it at 2.87, so delta may not fully recover to 18-input DV).
input_mask = [0, 2, 3, 5, 6, 7, 11, 12, 18, 27, 28, 29, 30]

[[network.architecture]]
type = "dense"
input_size = 13
output_size = 32
activation = "swish"

[[network.architecture]]
type = "dense"
input_size = 32
output_size = 16
activation = "swish"

[[network.architecture]]
type = "dense"
input_size = 16
output_size = 1
activation = "tanh"

