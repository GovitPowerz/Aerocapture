base = ["../missions/mars.toml", "common.toml", "nn_common.toml"]

[guidance.neural_network]
mode = "full_neural"
scaffolding = "live"
output_parameterization = "delta"
delta_max = 0.35

[data]
neural_network = "training_output/neural_network_delta_pso/best_model.json"
results_suffix = ".train_delta_pso"

[network]
# 23 inputs (pruned from 30 per ablation on the retrained delta): dropped
# bounce_flag (15) + exit-bank-teacher (sin,cos) 25/26 -- delta carries phase
# implicitly via its bank integrator, so these crutches ablated near-zero --
# plus periapsis_alt (31), altitude (8), latitude (10), pdyn_nominal (17), all
# near-zero. Kept: baseline + ref-traj + lateral telemetry (21,23,24) +
# prev-commanded/prev-realized (sin,cos) 27-30 (delta's top inputs).
input_mask = [0, 1, 2, 3, 4, 5, 6, 7, 9, 11, 12, 13, 14, 16, 18, 19, 21, 23, 24, 27, 28, 29, 30]

[[network.architecture]]
type = "dense"
input_size = 23
output_size = 32
activation = "swish"

[[network.architecture]]
type = "dense"
input_size = 32
output_size = 16
activation = "swish"

[[network.architecture]]
type = "dense"
input_size = 16
output_size = 1
activation = "tanh"

