# Mamba (selective SSM) decoder on the atan2 input pipeline. Inherits the
# 17-input mask, the calibrated [network.normalization] (35 entries),
# full_neural / atan2_signed, scaffolding = "live", command shaping and
# navigation from the atan2 config; overrides only the architecture
# (Dense -> Mamba -> Dense) and the deploy path.
base = ["msr_aller_nn_atan2_train.toml"]

[data]
neural_network = "training_output/neural_network_mamba_atan2_adaptive/best_model.json"
results_suffix = ".train_nn_mamba_atan2"

# Architecture arrays REPLACE (not merge) under deep-merge, so this fully
# supersedes atan2's 3-dense stack. Sized under the 758-param plain-atan2 budget
# (<1000 weights): frontend Dense(17->16) sets Mamba d_inner = input_size = 16,
# dt_rank auto-resolves to max(1, 16 // 16) = 1, selective-SSM state d_state=12;
# final Dense(16->2) feeds the atan2_signed decoder.
# Params: 288 + mamba(d_inner=16,d_state=12,dt_rank=1)=640 + 34 = 962.
[[network.architecture]]
type = "dense"
input_size = 17
output_size = 16
activation = "swish"

[[network.architecture]]
type = "mamba"
input_size = 16
d_state = 12

[[network.architecture]]
type = "dense"
input_size = 16
output_size = 2
activation = "asinh"
