base = ["../missions/mars.toml", "common.toml", "nn_common.toml"]

[guidance.neural_network]
mode = "full_neural"
scaffolding = "live"
output_parameterization = "scaled_pi"
scaled_pi_n = 2.0

[data]
neural_network = "training_output/neural_network_scaledpi_pso/best_model.json"
results_suffix = ".train_scaledpi_pso"

[network]
# 11 inputs: 18-mask minus union of per-decoder low-importance prunes
# {inclination_error(1), velocity(4), accel_magnitude(5), fpa(9), pdyn_error(19)}
# + pdyn_nominal(17) + heat_load_fraction(7). Aggressive shared cut -- NOTE some
# removed inputs ablated HIGH for specific decoders (accel_magnitude=atan2 3.32,
# heat_load_fraction=delta 3.22, pdyn_nominal=delta 2.87); bet that retraining compensates.
input_mask = [0, 2, 3, 6, 11, 12, 18, 27, 28, 29, 30]

[[network.architecture]]
type = "dense"
input_size = 11
output_size = 32
activation = "swish"

[[network.architecture]]
type = "dense"
input_size = 32
output_size = 16
activation = "swish"

[[network.architecture]]
type = "dense"
input_size = 16
output_size = 1
activation = "tanh"

