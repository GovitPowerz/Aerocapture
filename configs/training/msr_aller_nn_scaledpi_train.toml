base = ["../missions/mars.toml", "common.toml", "nn_common.toml"]

[guidance.neural_network]
mode = "full_neural"
scaffolding = "live"
output_parameterization = "scaled_pi"
scaled_pi_n = 2.0

[data]
neural_network = "training_output/neural_network_scaledpi_pso/best_model.json"
results_suffix = ".train_scaledpi_pso"

[network]
# 18 inputs: atan2 24-mask minus sma_error(13), apoapsis_alt(14),
# cos_bank_nominal(16), inclination_err_rate(21), time_since_sign_flip(23),
# inclination_err_integral(24) -- leaner-observation experiment (drops 2
# orbit-state + 1 reference + 3 lateral-telemetry inputs; applied to all 3 decoders).
input_mask = [0, 1, 2, 3, 4, 5, 6, 7, 9, 11, 12, 17, 18, 19, 27, 28, 29, 30]

[[network.architecture]]
type = "dense"
input_size = 18
output_size = 32
activation = "swish"

[[network.architecture]]
type = "dense"
input_size = 32
output_size = 16
activation = "swish"

[[network.architecture]]
type = "dense"
input_size = 16
output_size = 1
activation = "tanh"

