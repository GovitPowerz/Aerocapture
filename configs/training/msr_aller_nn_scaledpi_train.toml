base = ["../missions/mars.toml", "common.toml", "nn_common.toml"]

[guidance.neural_network]
mode = "full_neural"
scaffolding = "live"
output_parameterization = "scaled_pi"
scaled_pi_n = 2.0

[data]
neural_network = "training_output/neural_network_scaledpi_pso/best_model.json"
results_suffix = ".train_scaledpi_pso"

[network]
# 24 inputs (pruned from 30 per ablation): dropped bounce_flag (15) +
# exit-bank-teacher (sin,cos) 25/26 -- an experiment to force the memoryless
# scaled_pi decoder to infer phase from continuous state rather than the
# explicit flag/FTC-teacher crutches (NOTE: these ablated as scaled_pi's #1/#3
# inputs, so this is a deliberate bet that retraining compensates) -- plus
# periapsis_alt (31), altitude (8), latitude (10), all near-zero. pdyn_nominal
# (17) KEPT (important for scaled_pi, unlike delta).
input_mask = [0, 1, 2, 3, 4, 5, 6, 7, 9, 11, 12, 13, 14, 16, 17, 18, 19, 21, 23, 24, 27, 28, 29, 30]

[[network.architecture]]
type = "dense"
input_size = 24
output_size = 32
activation = "swish"

[[network.architecture]]
type = "dense"
input_size = 32
output_size = 16
activation = "swish"

[[network.architecture]]
type = "dense"
input_size = 16
output_size = 1
activation = "tanh"

