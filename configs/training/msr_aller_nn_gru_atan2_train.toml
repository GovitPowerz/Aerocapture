# GRU decoder on the atan2 input pipeline. Inherits the 17-input mask, the
# calibrated [network.normalization] (35 entries), full_neural / atan2_signed,
# scaffolding = "live", command shaping and navigation from the atan2 config;
# overrides only the architecture (Dense -> GRU -> Dense) and the deploy path.
base = ["msr_aller_nn_atan2_train.toml"]

[data]
neural_network = "training_output/neural_network_gru_atan2/best_model.json"
results_suffix = ".train_nn_gru_atan2"

# Architecture arrays REPLACE (not merge) under deep-merge, so this fully
# supersedes atan2's 3-dense stack. Frontend Dense(17->32) matches input_mask
# length (17); final Dense(32->2) feeds the atan2_signed decoder.
[[network.architecture]]
type = "dense"
input_size = 17
output_size = 16
activation = "swish"

[[network.architecture]]
type = "gru"
input_size = 16
hidden_size = 16

[[network.architecture]]
type = "dense"
input_size = 16
output_size = 2
activation = "asinh"
