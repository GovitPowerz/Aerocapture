# dense variant, 201 trainable weights (sub-500 capability-collapse sweep point).
# Base-inherits the tuned atan2 pipeline (17-input mask, calibrated
# normalization, full_neural / atan2_signed, scaffolding = live, command
# shaping + navigation); overrides only the architecture and deploy path.
base = ["../msr_aller_nn_atan2_train.toml"]

[data]
neural_network = "training_output/sweep_dense_p201/best_model.json"
results_suffix = ".sweep_dense_p201"

[[network.architecture]]
type = "dense"
input_size = 17
output_size = 8
activation = "swish"

[[network.architecture]]
type = "dense"
input_size = 8
output_size = 5
activation = "swish"

[[network.architecture]]
type = "dense"
input_size = 5
output_size = 2
activation = "asinh"
