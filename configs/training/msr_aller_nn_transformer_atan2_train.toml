# Transformer decoder on the atan2 input pipeline. Inherits the 17-input mask,
# the calibrated [network.normalization] (35 entries), full_neural /
# atan2_signed, scaffolding = "live", command shaping and navigation from the
# atan2 config; overrides only the architecture (Dense -> Transformer -> Dense)
# and the deploy path.
base = ["msr_aller_nn_atan2_train.toml"]

[data]
neural_network = "training_output/neural_network_transformer_atan2/best_model.json"
results_suffix = ".train_nn_transformer_atan2"

# Architecture arrays REPLACE (not merge) under deep-merge, so this fully
# supersedes atan2's 3-dense stack. Sized under the 758-param plain-atan2 budget
# (<1000 weights). The 4*d_model^2 attention term dominates, so d_model is the
# binding knob: d_model=10 (d_model % n_heads == 0) leaves room for d_ffn=14 over
# a causal n_seq=32 KV ring buffer; frontend Dense(17->10), final Dense(10->2)
# feeds atan2_signed. Params: 180 + transformer(d=10,d_ffn=14)=784 + 22 = 986.
[[network.architecture]]
type = "dense"
input_size = 17
output_size = 10
activation = "swish"

[[network.architecture]]
type = "transformer"
d_model = 10
n_heads = 2
d_ffn = 14
n_seq = 32

[[network.architecture]]
type = "dense"
input_size = 10
output_size = 2
activation = "asinh"
