[simulation]
n_sims = 100
random_seed = 0.6866

[data]
output_dir = "output"
atmosphere = "data/atmosphere/mars.dat"
reference_trajectory = "data/reference_trajectory/msr_aller.dat"
results_suffix = ".mc100_domain"

# ── Domain-based Monte Carlo dispersions ──
# Replaces lottery files entirely. Draws generated from seed at runtime.

[monte_carlo]
seed = 42

[monte_carlo.initial_state]
level = "medium"

[monte_carlo.atmosphere]
level = "high"

[monte_carlo.aerodynamics]
level = "medium"

[monte_carlo.navigation]
level = "low"

[monte_carlo.mass]
level = "off"

[monte_carlo.vehicle]
level = "medium"

[monte_carlo.pilot]
level = "low"

[monte_carlo.nav_filter]
level = "medium"

