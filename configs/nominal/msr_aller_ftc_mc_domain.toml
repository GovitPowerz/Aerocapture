# MSR outbound — FTC guided, 100-sim Monte Carlo with domain-based dispersions
# No lottery file needed — draws generated from seed at runtime
#
# Dispersion levels: "off", "low", "medium", "high", "custom"
# For "custom", add sigma overrides directly in the domain section.

