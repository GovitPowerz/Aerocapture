# Test: reference trajectory, constant bank angle 64.77 deg
# Reference data: tests/reference_data/rust_golden/high_bank/
base = ["../missions/mars.toml"]

[guidance]
type = "ftc"
reference_trajectory = true
reference_bank_angle = 64.77

[simulation]
n_sims = 1
random_seed = 0.6866

[data]
results_suffix = ".test_high_bank_orig"

[onboard_atmosphere]
mode = "identical"
