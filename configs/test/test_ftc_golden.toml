# Golden regression test — FTC, 3 MC sims, deterministic seed
base = ["../missions/mars.toml"]

[guidance]
type = "ftc"

[guidance.ftc]
pressure_coeff_base = -0.001
pressure_coeff_scale_height = 10.0
gain_fade_start_km = 80.0
gain_fade_end_km = 100.0

[simulation]
n_sims = 3
random_seed = 0.6866

[data]
results_suffix = ".golden_ftc"

[onboard_atmosphere]
mode = "identical"

[monte_carlo]
seed = 42

[monte_carlo.initial_state]
level = "medium"

[monte_carlo.atmosphere]
level = "high"

[monte_carlo.aerodynamics]
level = "medium"

[monte_carlo.navigation]
level = "low"

[monte_carlo.mass]
level = "off"
