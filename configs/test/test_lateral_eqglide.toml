# Test config: Equilibrium glide with lateral guidance active
base = ["../missions/mars.toml"]

[guidance]
type = "equilibrium_glide"

[guidance.lateral]
corridor_slope = 13080.458
corridor_intercept = 0.0
lateral_activation = -0.5     # MJ/kg
lateral_inhibition = -10.0    # MJ/kg
max_reversals = 5

[simulation]
n_sims = 1
